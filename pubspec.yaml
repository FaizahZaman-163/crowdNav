  firebase_messaging: ^14.7.20

  shared_preferences: ^2.2.2
  intl: ^0.19.0
  url_launcher: ^6.2.5
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true