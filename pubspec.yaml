publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.3.0
  google_fonts: ^8.1.0
  cupertino_icons: ^1.0.6

  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  collection: ^1.19.0          

  geolocator: ^11.0.0
  geocoding: ^3.0.0
